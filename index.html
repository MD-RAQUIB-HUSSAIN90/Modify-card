<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="outer">
        <div class="form-container">

            <form action="" id="action">
                <div class="inputSection">
                    <label for="imgUrl">Image URL</label>
                    <input type="text" id="imgUrl" placeholder="https://example.com/photo.jpg" class="inputType">

                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" placeholder="Enter full name" class="inputType">
                    <label for="homeTown">Home Town</label>
                    <input type="text" id="homeTown" placeholder="Enter home town" class="inputType">
                    <label for="purpose">Purpose</label>
                    <input type="text" id="purpose" placeholder="e.g., Quick appointment" class="inputType">
                </div>

                <label id="category">Category</label>

                <div class="tag-checkbox">
                    <label>
                        <input type="radio" name="plan" value="emergency">
                        Emergency
                    </label>

                    <label>
                        <input type="radio" name="plan" value="important">
                        Important
                    </label>

                    <label>
                        <input type="radio" name="plan" value="urgent">
                        Urgent
                    </label>

                    <label>
                        <input type="radio" name="plan" value="no_rush">
                        No Rush
                    </label>
                </div>
                <button class="submit btn">Create Notes</button>
            </form>
            <button class="close btn">Close</button>

        </div>
        <div class="note-container">
            <div class="left-icons">
                <button id="add-note">
                    <i class="ri-add-line"></i>
                </button>
                <button>
                    <i class="ri-arrow-up-line"></i>
                </button>
                <button>
                    <i class="ri-arrow-down-line"> </i>
                </button>
            </div>
        </div>
    </div>


    <script src="script.js"></script>
</body>

</html>
